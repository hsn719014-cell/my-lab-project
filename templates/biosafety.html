<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biosafety Protocols</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .safety-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-left: 4px solid #f39c12; }
        .back-btn { background: rgba(243, 156, 18, 0.1); border: 1px solid #f39c12; color: #f39c12; }
    </style>
</head>
<body class="p-4 pb-24">
    <header class="flex items-center justify-between mb-8 sticky top-0 bg-black/90 backdrop-blur-md z-50 py-3 border-b border-zinc-800">
        <button onclick="window.location.href='/dashboard'" class="back-btn px-4 py-2 rounded-xl font-bold flex items-center gap-2">
            <i class="fas fa-chevron-left"></i> BACK
        </button>
        <div class="text-right">
            <h1 class="text-orange-500 font-black text-lg italic uppercase">Biosafety</h1>
            <p class="text-[8px] text-zinc-500 uppercase tracking-widest font-bold">Lab Rules 2026</p>
        </div>
    </header>

    <div class="space-y-6" id="safety-grid">
        <script>
            const grid = document.getElementById('safety-grid');
            for (let i = 1; i <= 16; i++) {
                grid.innerHTML += `
                    <div class="safety-card rounded-2xl overflow-hidden shadow-2xl">
                        <img src="/static/images/biosafety/rule${i}.JPG" class="w-full h-auto block" alt="Safety Rule ${i}" onerror="this.parentElement.style.display='none'">
                        <div class="p-4 bg-zinc-900/50">
                            <span class="text-orange-500 font-black text-[10px] tracking-widest">PROTOCOL #${String(i).padStart(2, '0')}</span>
                        </div>
                    </div>
                `;
            }
        </script>
    </div>

    <button onclick="window.location.href='/dashboard'" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-orange-500 text-black w-14 h-14 rounded-full flex items-center justify-center text-xl shadow-[0_0_20px_rgba(243,156,18,0.5)] z-50">
        <i class="fas fa-home"></i>
    </button>
</body>
</html>
